version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Uncomment to use PostgreSQL:
      # DATABASE_URL: postgresql://smart_user:smart_pass@db:5432/smart_entry
    volumes:
      - ./instance:/app/instance    # Persist SQLite DB and logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
